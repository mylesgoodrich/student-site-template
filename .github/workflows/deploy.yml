name: Deploy Full Stack Application

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    AWS_REGION: us-east-1
    PROJECT_NAME: ${{ secrets.PROJECT_NAME || 'student-site' }}
    HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
    BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
    FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN || 'www' }}
    BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN || 'api' }}
    GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}

jobs:
    deploy:
        name: Deploy Infrastructure and Application
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Skip deploy (AWS not configured)
              if: env.GITHUB_ACTIONS_ROLE_ARN == ''
              run: echo "Deploy skipped. Add GITHUB_ACTIONS_ROLE_ARN (and other AWS secrets) in repo Settings to enable deploy." && exit 0

            - name: Configure AWS credentials
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ env.GITHUB_ACTIONS_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Set up Python
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install AWS CLI and CloudFormation dependencies
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              run: |
                  pip install boto3 awscli

            - name: Create or verify artifacts bucket
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              id: artifacts-bucket
              run: |
                  BUCKET_NAME="${PROJECT_NAME}-artifacts-$(aws sts get-caller-identity --query Account --output text)"

                  if aws s3 ls "s3://${BUCKET_NAME}" 2>&1 | grep -q 'NoSuchBucket'; then
                    echo "Creating artifacts bucket: ${BUCKET_NAME}"
                    aws s3 mb "s3://${BUCKET_NAME}" --region ${AWS_REGION}
                    aws s3api put-bucket-versioning \
                      --bucket "${BUCKET_NAME}" \
                      --versioning-configuration Status=Enabled
                  else
                    echo "Artifacts bucket already exists: ${BUCKET_NAME}"
                  fi

                  echo "bucket_name=${BUCKET_NAME}" >> $GITHUB_OUTPUT

            - name: Create or verify ECR repository
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              id: ecr-repo
              run: |
                  REPO_NAME="${PROJECT_NAME}-backend"
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO_NAME}"

                  if ! aws ecr describe-repositories --repository-names "${REPO_NAME}" --region ${AWS_REGION} 2>/dev/null; then
                    echo "Creating ECR repository: ${REPO_NAME}"
                    aws ecr create-repository \
                      --repository-name "${REPO_NAME}" \
                      --region ${AWS_REGION} \
                      --image-scanning-configuration scanOnPush=true
                  else
                    echo "ECR repository already exists: ${REPO_NAME}"
                  fi

                  echo "repository_uri=${REPO_URI}" >> $GITHUB_OUTPUT

            - name: Upload CloudFormation templates to S3
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              run: |
                  aws s3 cp infrastructure/cloudformation/frontend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/frontend-stack.yml"
                  aws s3 cp infrastructure/cloudformation/backend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/backend-stack.yml"

            - name: Build and push Docker image
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              id: docker-build
              run: |
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-backend"

                  # Login to ECR
                  aws ecr get-login-password --region ${AWS_REGION} | \
                    docker login --username AWS --password-stdin ${REPO_URI}

                  # Build Docker image
                  docker build -t ${PROJECT_NAME}-backend:latest ./backend
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:latest
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:${GITHUB_SHA}

                  # Push to ECR
                  docker push ${REPO_URI}:latest
                  docker push ${REPO_URI}:${GITHUB_SHA}

                  echo "image_uri=${REPO_URI}:latest" >> $GITHUB_OUTPUT

            - name: Deploy CloudFormation main stack
              run: |
                  aws cloudformation deploy \
                    --template-file infrastructure/cloudformation/main.yml \
                    --stack-name ${PROJECT_NAME}-main \
                    --parameter-overrides \
                      ProjectName=${PROJECT_NAME} \
                      HostedZoneId=${HOSTED_ZONE_ID} \
                      FrontendDomain=${FRONTEND_DOMAIN} \
                      BackendDomain=${BACKEND_DOMAIN} \
                      BaseDomain=${BASE_DOMAIN} \
                      GitHubActionsRoleArn=${GITHUB_ACTIONS_ROLE_ARN} \
                    --capabilities CAPABILITY_IAM \
                    --region ${AWS_REGION} \
                    --no-fail-on-empty-changeset

            - name: Update ECS service with new image
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              run: |
                  CLUSTER_NAME="${PROJECT_NAME}-cluster"
                  SERVICE_NAME="${PROJECT_NAME}-service"

                  # Force new deployment to pick up latest image
                  aws ecs update-service \
                    --cluster ${CLUSTER_NAME} \
                    --service ${SERVICE_NAME} \
                    --force-new-deployment \
                    --region ${AWS_REGION} || echo "Service update skipped (may not exist yet)"

            - name: Output deployment URLs
              if: env.GITHUB_ACTIONS_ROLE_ARN != ''
              run: |
                  echo "## Deployment Complete đźš€" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Frontend URL: https://${FRONTEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
                  echo "Backend URL: https://${BACKEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
