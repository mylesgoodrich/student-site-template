AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frontend stack - AWS Amplify for Next.js application'

Parameters:
  ProjectName:
    Type: String
    Description: Name of the project

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID

  FrontendDomain:
    Type: String
    Description: Subdomain for frontend

  BackendDomain:
    Type: String
    Description: Subdomain for backend API

  BaseDomain:
    Type: String
    Description: Base domain name

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub '${ProjectName}-frontend'
      # Note: Repository and OAuth token should be configured manually in AWS Amplify Console
      # or via AWS CLI after initial deployment
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: .next
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: '/<*>'
          Target: '/index.html'
          Status: '200'
      EnvironmentVariables:
        - Name: NEXT_PUBLIC_API_URL
          Value: !Sub 'https://${BackendDomain}.${BaseDomain}'

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: main
      EnableAutoBuild: true

  AmplifyDomain:
    Type: AWS::Amplify::Domain
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      DomainName: !Ref BaseDomain
      SubDomainSettings:
        # Root domain (mylesgoodrich.com)
        - BranchName: !GetAtt AmplifyBranch.BranchName
          Prefix: ''
        # www subdomain (www.mylesgoodrich.com)
        - BranchName: !GetAtt AmplifyBranch.BranchName
          Prefix: !Ref FrontendDomain
      AutoSubDomainCreationPatterns: []
      EnableAutoSubDomain: false

  # www subdomain record — CNAME to Amplify
  Route53RecordWWW:
    Type: AWS::Route53::RecordSet
    DependsOn: AmplifyDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${FrontendDomain}.${BaseDomain}'
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub 'd${AmplifyApp.AppId}.cloudfront.net'

  # Root domain record — ALIAS (apex domains cannot use CNAME)
  Route53RecordRoot:
    Type: AWS::Route53::RecordSet
    DependsOn: AmplifyDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref BaseDomain
      Type: A
      AliasTarget:
        DNSName: !Sub 'd${AmplifyApp.AppId}.cloudfront.net'
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

Outputs:
  FrontendURL:
    Description: Frontend application URL (root domain)
    Value: !Sub 'https://${BaseDomain}'
    Export:
      Name: !Sub '${ProjectName}-FrontendURL'

  FrontendWWWURL:
    Description: Frontend application URL (www)
    Value: !Sub 'https://${FrontendDomain}.${BaseDomain}'

  AmplifyAppId:
    Description: Amplify App ID
    Value: !GetAtt AmplifyApp.AppId
    Export:
      Name: !Sub '${ProjectName}-AmplifyAppId'
