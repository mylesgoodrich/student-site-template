AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frontend stack - AWS Amplify for Next.js application'

Parameters:
  ProjectName:
    Type: String
    Description: Name of the project

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID

  FrontendDomain:
    Type: String
    Description: Subdomain for frontend

  BackendDomain:
    Type: String
    Description: Subdomain for backend API

  BaseDomain:
    Type: String
    Description: Base domain name

  RepositoryUrl:
    Type: String
    Description: GitHub repository URL (for example, https://github.com/org/repo)

  AmplifyAccessToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token used by Amplify to connect the repository

Conditions:
  IsApexDomain: !Equals [!Ref FrontendDomain, '@']

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub '${ProjectName}-frontend'
      Platform: WEB_COMPUTE
      Repository: !Ref RepositoryUrl
      AccessToken: !Ref AmplifyAccessToken
      BuildSpec: |
        version: 1
        applications:
          - appRoot: frontend
            frontend:
              phases:
                preBuild:
                  commands:
                    - npm ci
                build:
                  commands:
                    - npm run build
              artifacts:
                baseDirectory: .next
                files:
                  - '**/*'
              cache:
                paths:
                  - node_modules/**/*
      EnvironmentVariables:
        - Name: NEXT_PUBLIC_API_URL
          Value: !Sub 'https://${BackendDomain}.${BaseDomain}'

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: main
      EnableAutoBuild: true

  AmplifyDomain:
    Type: AWS::Amplify::Domain
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      DomainName: !Ref BaseDomain
      SubDomainSettings:
        - Branch: !Ref AmplifyBranch
          Prefix: !If [IsApexDomain, '', !Ref FrontendDomain]

Outputs:
  FrontendURL:
    Description: Frontend application URL
    Value: !Sub 'https://${FrontendDomain}.${BaseDomain}'
    Export:
      Name: !Sub '${ProjectName}-FrontendURL'

  AmplifyAppId:
    Description: Amplify App ID
    Value: !GetAtt AmplifyApp.AppId
    Export:
      Name: !Sub '${ProjectName}-AmplifyAppId'
