<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCT 3233 Final — Practice Exam</title>
<style>
  :root {
    --lsu-purple: #461D7C;
    --lsu-purple-light: #6A3BAF;
    --lsu-purple-soft: #EDE7F6;
    --lsu-gold: #FDD023;
    --lsu-gold-soft: #FFF8DC;
    --bg: #FAFAFC;
    --text: #1A1A1A;
    --text-muted: #666;
    --border: #E0E0E0;
    --correct: #1A6B1A;
    --correct-bg: #D4EDDA;
    --incorrect: #B71C1C;
    --incorrect-bg: #F8D7DA;
    --shadow: 0 2px 8px rgba(70, 29, 124, 0.08);
    --shadow-lg: 0 8px 24px rgba(70, 29, 124, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--lsu-purple) 0%, var(--lsu-purple-light) 100%);
    color: white;
    padding: 1.5rem 2rem;
    box-shadow: var(--shadow-lg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .brand-bar {
    width: 6px;
    height: 40px;
    background: var(--lsu-gold);
    border-radius: 3px;
  }

  .brand h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .brand .subtitle {
    font-size: 0.8rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  .stats {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    font-size: 0.9rem;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 60px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--lsu-gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    opacity: 0.85;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Container */
  main {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  /* Start Screen */
  .start-screen {
    background: white;
    border-radius: 12px;
    padding: 2.5rem;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .start-screen h2 {
    color: var(--lsu-purple);
    font-size: 1.75rem;
    margin-bottom: 0.75rem;
  }

  .start-screen .tagline {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 1.05rem;
  }

  .distribution {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin: 1.5rem 0 2rem;
    text-align: left;
  }

  .dist-item {
    background: var(--lsu-purple-soft);
    border-left: 4px solid var(--lsu-purple);
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }

  .dist-item strong {
    display: block;
    color: var(--lsu-purple);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }

  .mode-selector {
    background: #F5F3FA;
    padding: 1.25rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .mode-selector h3 {
    color: var(--lsu-purple);
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mode-options {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .mode-btn {
    flex: 1;
    min-width: 140px;
    padding: 0.75rem 1rem;
    border: 2px solid var(--border);
    background: white;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
    text-align: center;
  }

  .mode-btn:hover {
    border-color: var(--lsu-purple-light);
  }

  .mode-btn.active {
    border-color: var(--lsu-purple);
    background: var(--lsu-purple);
    color: white;
  }

  .mode-btn strong {
    display: block;
    margin-bottom: 2px;
  }

  .mode-btn small {
    font-size: 0.75rem;
    opacity: 0.8;
  }

  .btn-primary {
    background: var(--lsu-purple);
    color: white;
    border: none;
    padding: 1rem 2.5rem;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }

  .btn-primary:hover {
    background: var(--lsu-purple-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  /* Progress Bar */
  .progress-wrap {
    background: white;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .progress-info span strong {
    color: var(--lsu-purple);
  }

  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--lsu-purple) 0%, var(--lsu-gold) 100%);
    transition: width 0.3s ease;
  }

  /* Question Card */
  .question-card {
    background: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--lsu-gold);
  }

  .q-number {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .q-source {
    background: var(--lsu-purple-soft);
    color: var(--lsu-purple);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .q-stem {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    font-size: 0.98rem;
    line-height: 1.5;
  }

  .choice:hover:not(.disabled) {
    border-color: var(--lsu-purple-light);
    background: var(--lsu-purple-soft);
  }

  .choice.selected {
    border-color: var(--lsu-purple);
    background: var(--lsu-purple-soft);
  }

  .choice.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .choice.incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
  }

  .choice.disabled {
    cursor: default;
  }

  .choice-letter {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--lsu-purple);
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .choice.correct .choice-letter {
    background: var(--correct);
  }

  .choice.incorrect .choice-letter {
    background: var(--incorrect);
  }

  .choice-text {
    flex: 1;
  }

  .choice-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  /* Explanation */
  .explanation {
    margin-top: 1.25rem;
    padding: 1.25rem;
    border-radius: 8px;
    border-left: 4px solid var(--lsu-gold);
    background: var(--lsu-gold-soft);
    animation: slideIn 0.3s ease;
  }

  .explanation.correct {
    border-left-color: var(--correct);
    background: var(--correct-bg);
  }

  .explanation.incorrect {
    border-left-color: var(--incorrect);
    background: var(--incorrect-bg);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explanation-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
  }

  .explanation-text {
    font-size: 0.93rem;
    line-height: 1.6;
    color: #333;
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1.5rem;
  }

  .btn-secondary {
    background: white;
    color: var(--lsu-purple);
    border: 2px solid var(--lsu-purple);
    padding: 0.75rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--lsu-purple);
    color: white;
  }

  .btn-secondary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Results Screen */
  .results {
    background: white;
    border-radius: 12px;
    padding: 2.5rem;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }

  .results h2 {
    color: var(--lsu-purple);
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 1.5rem auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: conic-gradient(var(--lsu-gold) var(--pct), #E8E4F0 var(--pct));
    position: relative;
  }

  .score-inner {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-size: 2.25rem;
    font-weight: 800;
    color: var(--lsu-purple);
    line-height: 1;
  }

  .score-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .score-detail {
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .score-detail strong {
    color: var(--lsu-purple);
  }

  .breakdown {
    margin: 2rem 0;
    text-align: left;
  }

  .breakdown h3 {
    color: var(--lsu-purple);
    margin-bottom: 0.75rem;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .breakdown-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 1rem;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }

  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-score {
    font-weight: 600;
    color: var(--lsu-purple);
  }

  .breakdown-bar {
    width: 80px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .breakdown-bar-fill {
    height: 100%;
    background: var(--lsu-gold);
  }

  .action-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  /* Review Mode */
  .review-item {
    background: white;
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--correct);
    text-align: left;
  }

  .review-item.incorrect {
    border-left-color: var(--incorrect);
  }

  .review-stem {
    font-weight: 500;
    margin-bottom: 0.75rem;
    font-size: 0.95rem;
  }

  .review-meta {
    display: flex;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .review-answer {
    font-size: 0.88rem;
    margin: 0.3rem 0;
    padding: 0.4rem 0.75rem;
    border-radius: 4px;
  }

  .review-answer.your {
    background: var(--incorrect-bg);
    color: var(--incorrect);
  }

  .review-answer.correct {
    background: var(--correct-bg);
    color: var(--correct);
  }

  .review-expl {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    line-height: 1.5;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* Mobile */
  @media (max-width: 600px) {
    header { padding: 1rem; }
    .brand h1 { font-size: 0.95rem; }
    .brand .subtitle { font-size: 0.7rem; }
    .stats { gap: 0.75rem; }
    .stat-value { font-size: 1.15rem; }
    .stat-label { font-size: 0.65rem; }
    main { padding: 0 1rem; margin: 1rem auto; }
    .question-card { padding: 1.25rem; }
    .start-screen { padding: 1.5rem; }
    .q-stem { font-size: 1rem; }
    .choice { padding: 0.85rem 1rem; font-size: 0.92rem; }
    .results { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-bar"></div>
      <div>
        <h1>ACCT 3233 / 7233 — Internal Audit</h1>
        <div class="subtitle">Final Exam Practice Test · Spring 2026 · Dr. Sumners</div>
      </div>
    </div>
    <div class="stats" id="stats" style="display:none;">
      <div class="stat"><div class="stat-value" id="stat-current">0</div><div class="stat-label">Question</div></div>
      <div class="stat"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
      <div class="stat"><div class="stat-value" id="stat-pct">—</div><div class="stat-label">Score</div></div>
    </div>
  </div>
</header>

<main id="app"></main>

<footer>ACCT 3233/7233 Final Exam Practice · Myles D. Goodrich · 50 questions across 7 sources</footer>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//   QUESTION BANK
// ═══════════════════════════════════════════════════════════════════════════
const QUESTIONS = [
  // AI GOVERNANCE (8)
  { source: "AI Governance", stem: "Under the EU AI Act, a general-purpose AI model is classified as posing systemic risk when its cumulative training compute exceeds:",
    choices: ["10²³ FLOPs", "10²⁴ FLOPs", "10²⁵ FLOPs", "10²⁶ FLOPs"], correctIndex: 2,
    explanation: "The EU AI Act sets the GPAI systemic risk threshold at >10²⁵ FLOPs cumulative compute. Models above this threshold face additional obligations including adversarial testing and incident reporting." },
  { source: "AI Governance", stem: "Which of the following is NOT one of the four core functions of the NIST AI Risk Management Framework?",
    choices: ["GOVERN", "MAP", "MEASURE", "MONITOR"], correctIndex: 3,
    explanation: "The 4 NIST AI RMF core functions are GOVERN, MAP, MEASURE, and MANAGE. MONITOR is not a core function. Mnemonic: 'Good Managers Monitor Machines' — the final M stands for MANAGE, not Monitor." },
  { source: "AI Governance", stem: "ISO/IEC 42001 differs from the NIST AI RMF most fundamentally because it:",
    choices: ["Was published five years earlier", "Is legally binding in all UN member states", "Is certifiable — organizations can earn third-party certification", "Applies only to AI systems used in the European Union"], correctIndex: 2,
    explanation: "ISO 42001 (Dec 2023) is certifiable through a two-stage audit process (Stage 1: documentation review; Stage 2: implementation audit). The NIST AI RMF (Jan 2023) is voluntary guidance — organizations cannot be 'NIST RMF certified.'" },
  { source: "AI Governance", stem: "Under the EU AI Act, an employer uses an AI system to continuously monitor employee productivity and emotion levels in real time. This application is best classified as:",
    choices: ["Limited Risk — transparency disclosure required", "High-Risk — Annex III employment category", "Minimal Risk — no obligations", "Unacceptable Risk — banned practice"], correctIndex: 3,
    explanation: "Emotion recognition in the workplace is explicitly listed as a BANNED (Unacceptable Risk) practice under the EU AI Act. This becomes enforceable from February 2025." },
  { source: "AI Governance", stem: "The NIST AI 600-1 Generative AI Profile, published in July 2024, specifically addresses which risks NOT covered in the original January 2023 AI RMF?",
    choices: ["Data governance and model lifecycle management", "Hallucination, CSAM, and information integrity", "Mandatory compliance penalties for AI developers", "Multi-agent orchestration and emergent behavior"], correctIndex: 1,
    explanation: "NIST AI 600-1 (July 2024) is the GenAI-specific profile addressing hallucination (confabulation), child sexual abuse material (CSAM) generation risks, and information integrity (disinformation). The original 2023 RMF did not address GenAI-specific risks." },
  { source: "AI Governance", stem: "UAIC-1's primary value proposition compared to existing frameworks like NIST and ISO 42001 is:",
    choices: ["It is legally enforceable in all G20 nations", "It provides cross-framework mapping to reduce duplicated compliance efforts", "It replaces the need for ISO 42001 certification", "It is the only framework covering third-party AI vendors"], correctIndex: 1,
    explanation: "UAIC-1's core value is cross-framework compliance mapping across its 7 domains — enabling organizations to satisfy NIST, ISO 42001, EU AI Act, and other frameworks simultaneously rather than managing separate compliance tracks." },
  { source: "AI Governance", stem: "Step 4 of the 6-step AI compliance strategy is best described as:",
    choices: ["Classify each AI system by risk tier", "Implement controls mapped to applicable framework requirements", "Monitor regulatory changes as AI capabilities evolve", "Document results and conduct audits"], correctIndex: 1,
    explanation: "The 6 steps are: 1. Inventory, 2. Classify Risk, 3. Map Frameworks, 4. Implement Controls, 5. Document & Audit, 6. Monitor Changes. Step 4 (Implement Controls) follows the mapping step — you can only implement controls once you know which frameworks apply." },
  { source: "AI Governance", stem: "Which of the following is an Annex III High-Risk AI application under the EU AI Act?",
    choices: ["AI-powered email spam filter", "AI that recommends Netflix movies", "AI that ranks job applicants for employer review", "AI-generated art creation tool"], correctIndex: 2,
    explanation: "The EU AI Act's Annex III lists employment and worker management as a High-Risk category — including AI used to recruit, rank, screen, or evaluate employees. Spam filters, recommendation engines, and art tools are Minimal Risk with no obligations." },

  // AI USAGE LEVELS (7)
  { source: "AI Usage Levels", stem: "In the AI Usage Levels taxonomy, the phase transition from 'Passive' to 'Active' occurs between:",
    choices: ["L0 and L1", "L1 and L2", "L3 and L4", "L5 and L6"], correctIndex: 1,
    explanation: "The Passive→Active transition occurs BETWEEN L1 (Structured Prompting) and L2 (Context Injection). At L2, AI stops using only training data and begins using the user's own data — RAG, file uploads, 200K+ token contexts." },
  { source: "AI Usage Levels", stem: "An auditor uploads the client's complete accounts payable transaction log to Claude before asking it to identify anomalous patterns. This usage is best classified as:",
    choices: ["L0 — Naive Prompting", "L1 — Structured Prompting", "L2 — Context Injection", "L3 — Tool Use + Connectors"], correctIndex: 2,
    explanation: "Uploading a file and injecting it into the AI's context is the defining feature of L2 (Context Injection / Analyst). The AI is now using the auditor's data, not just training data. L3 would require the AI to directly read/write external systems via API calls." },
  { source: "AI Usage Levels", stem: "An AI agent that automatically creates GitHub pull requests, runs test suites, and commits approved changes to a code repository is operating at:",
    choices: ["L1 — Structured Prompting", "L2 — Context Injection", "L3 — Tool Use + Connectors", "L4 — Persistent Memory + Skills"], correctIndex: 2,
    explanation: "L3 (Tool Use + Connectors / Architect) is characterized by the AI reading and writing external state via connectors like MCP. Creating GitHub PRs and committing code requires direct read/write access to external systems — the hallmark of L3." },
  { source: "AI Usage Levels", stem: "Which frontier axis is MOST important from a GRC/audit perspective due to its ability to provide mathematical proof of agent behavior?",
    choices: ["Stigmergic/Rhizomatic Coordination (10%)", "Persistent Autonomous Agents (25%)", "Formally Verified Agent Systems (15%)", "Self-Organizing Topologies (20%)"], correctIndex: 2,
    explanation: "Formally Verified Agent Systems (15% maturity) is the most important frontier axis for GRC/audit/metrological applications because it provides mathematical proof of agent behavior correctness — the only axis that can support regulatory assertions and auditability claims." },
  { source: "AI Usage Levels", stem: "Wesley Ladd's taxonomy states that AI usage levels are 'additive, not replacements.' This means:",
    choices: ["Organizations should only use the highest level they can implement", "Level 3 capability makes Level 1 and 2 skills obsolete", "Each higher level includes all capabilities of all lower levels", "Levels can be skipped — organizations can jump from L1 to L5"], correctIndex: 2,
    explanation: "Levels are cumulative: an L4 Governor still uses L0 prompting, L1 structure, L2 context injection, L3 tools, and L4 persistent skills simultaneously. You cannot jump levels, and higher levels do not replace lower ones — they add to them." },
  { source: "AI Usage Levels", stem: "When would an AI practitioner choose few-shot prompting over zero-shot prompting?",
    choices: ["When the task is simple and the model handles it reliably", "When the desired output format is novel or domain-specific and zero-shot fails", "When the user wants to minimize the length of the prompt", "When working at L0 or L1 only"], correctIndex: 1,
    explanation: "Few-shot prompting (2–5+ examples) is used when the task format is novel, domain-specific, or when zero/one-shot attempts fail. Zero-shot is used for well-defined tasks the model handles reliably from training alone." },

//   STATE & UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
const LETTERS = ['A', 'B', 'C', 'D'];
const state = {
  mode: 'all',
  questions: [],
  currentIdx: 0,
  selected: null,
  locked: false,
  score: 0,
  answers: [],
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions(mode) {
  let pool = [...QUESTIONS];
  if (mode === 'quick') pool = shuffle(pool).slice(0, 15);
  else if (mode === 'medium') pool = shuffle(pool).slice(0, 25);
  else pool = shuffle(pool);

  // Randomize answer choices within each question too
  return pool.map(q => {
    const shuffledOrder = shuffle([0, 1, 2, 3]);
    const newChoices = shuffledOrder.map(i => q.choices[i]);
    const newCorrectIndex = shuffledOrder.indexOf(q.correctIndex);
    return { ...q, choices: newChoices, correctIndex: newCorrectIndex };
  });
}

//   RENDER
// ═══════════════════════════════════════════════════════════════════════════
const app = document.getElementById('app');
const statsEl = document.getElementById('stats');

function renderStart() {
  statsEl.style.display = 'none';
  app.innerHTML = `
    <div class="start-screen">
      <h2>Final Exam Practice</h2>
      <p class="tagline">Interactive review covering all 7 course sources. Questions and answer choices randomize every session.</p>

      <div class="distribution">
        <div class="dist-item"><strong>AI Governance</strong>8 questions</div>
        <div class="dist-item"><strong>AI Usage Levels</strong>7 questions</div>
        <div class="dist-item"><strong>Milgram</strong>7 questions</div>
        <div class="dist-item"><strong>Risk Management</strong>6 questions</div>
        <div class="dist-item"><strong>BeyondTrust</strong>5 questions</div>
        <div class="dist-item"><strong>Celonis</strong>5 questions</div>
        <div class="dist-item"><strong>Latin Vocab</strong>7 questions</div>
        <div class="dist-item"><strong>Integration</strong>5 questions</div>
      </div>

      <div class="mode-selector">
        <h3>Choose Length</h3>
        <div class="mode-options">
          <button class="mode-btn" data-mode="quick"><strong>Quick</strong><small>15 questions</small></button>
          <button class="mode-btn" data-mode="medium"><strong>Medium</strong><small>25 questions</small></button>
          <button class="mode-btn active" data-mode="all"><strong>Full</strong><small>All 50 questions</small></button>
        </div>
      </div>

      <button class="btn-primary" id="start-btn">Start Practice Exam →</button>
    </div>
  `;

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });

  document.getElementById('start-btn').addEventListener('click', startExam);
}

function startExam() {
  state.questions = prepareQuestions(state.mode);
  state.currentIdx = 0;
  state.selected = null;
  state.locked = false;
  state.score = 0;
  state.answers = [];
  statsEl.style.display = 'flex';
  renderQuestion();
}

function updateStats() {
  document.getElementById('stat-current').textContent = `${state.currentIdx + 1}/${state.questions.length}`;
  document.getElementById('stat-correct').textContent = state.score;
  const answered = state.answers.length;
  document.getElementById('stat-pct').textContent = answered > 0 ? Math.round((state.score / answered) * 100) + '%' : '—';
}

function renderQuestion() {
  updateStats();
  const q = state.questions[state.currentIdx];
  const pct = ((state.currentIdx) / state.questions.length) * 100;

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-info">
        <span>Question <strong>${state.currentIdx + 1}</strong> of <strong>${state.questions.length}</strong></span>
        <span>${Math.round(pct)}% complete</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-card">
      <div class="question-meta">
        <span class="q-number">Question ${state.currentIdx + 1}</span>
        <span class="q-source">${q.source}</span>
      </div>
      <div class="q-stem">${escapeHTML(q.stem)}</div>
      <div class="choices" id="choices">
        ${q.choices.map((c, i) => `
          <button class="choice" data-idx="${i}">
            <div class="choice-letter">${LETTERS[i]}</div>
            <div class="choice-text">${escapeHTML(c)}</div>
          </button>
        `).join('')}
      </div>
      <div id="explanation-slot"></div>
      <div class="controls">
        <button class="btn-secondary" id="prev-btn" ${state.currentIdx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="btn-secondary" id="skip-btn">Skip →</button>
        <button class="btn-primary" id="next-btn" style="display:none;">Next Question →</button>
      </div>
    </div>
  `;

  // Wire up
  document.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => selectChoice(parseInt(btn.dataset.idx)));
  });
  document.getElementById('prev-btn').addEventListener('click', prevQuestion);
  document.getElementById('skip-btn').addEventListener('click', skipQuestion);

  // If this question was already answered, show its state
  const existing = state.answers.find(a => a.questionIdx === state.currentIdx);
  if (existing) {
    replayAnswer(existing);
  }
}

function selectChoice(idx) {
  if (state.locked) return;
  state.locked = true;
  state.selected = idx;

  const q = state.questions[state.currentIdx];
  const isCorrect = idx === q.correctIndex;

  // Track answer
  const existing = state.answers.findIndex(a => a.questionIdx === state.currentIdx);
  const answerRecord = { questionIdx: state.currentIdx, selectedIdx: idx, correctIdx: q.correctIndex, isCorrect };
  if (existing >= 0) {
    // Undo previous score adjustment
    if (state.answers[existing].isCorrect) state.score--;
    state.answers[existing] = answerRecord;
  } else {
    state.answers.push(answerRecord);
  }
  if (isCorrect) state.score++;

  // Visual update
  document.querySelectorAll('.choice').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correctIndex) {
      btn.classList.add('correct');
      const icon = document.createElement('div');
      icon.className = 'choice-icon';
      icon.textContent = '✓';
      btn.appendChild(icon);
    } else if (i === idx && !isCorrect) {
      btn.classList.add('incorrect');
      const icon = document.createElement('div');
      icon.className = 'choice-icon';
      icon.textContent = '✗';
      btn.appendChild(icon);
    }
  });

  // Explanation
  const slot = document.getElementById('explanation-slot');
  slot.innerHTML = `
    <div class="explanation ${isCorrect ? 'correct' : 'incorrect'}">
      <div class="explanation-header">
        ${isCorrect ? '✓ Correct' : '✗ Incorrect — Correct answer: ' + LETTERS[q.correctIndex]}
      </div>
      <div class="explanation-text">${escapeHTML(q.explanation)}</div>
    </div>
  `;

  // Swap skip → next
  document.getElementById('skip-btn').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = state.currentIdx === state.questions.length - 1 ? 'See Results →' : 'Next Question →';
  nextBtn.addEventListener('click', nextQuestion);

  updateStats();
}

function replayAnswer(answer) {
  const q = state.questions[state.currentIdx];
  state.locked = true;

  document.querySelectorAll('.choice').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correctIndex) {
      btn.classList.add('correct');
      const icon = document.createElement('div');
      icon.className = 'choice-icon';
      icon.textContent = '✓';
      btn.appendChild(icon);
    } else if (i === answer.selectedIdx && !answer.isCorrect) {
      btn.classList.add('incorrect');
      const icon = document.createElement('div');
      icon.className = 'choice-icon';
      icon.textContent = '✗';
      btn.appendChild(icon);
    }
  });

  const slot = document.getElementById('explanation-slot');
  slot.innerHTML = `
    <div class="explanation ${answer.isCorrect ? 'correct' : 'incorrect'}">
      <div class="explanation-header">
        ${answer.isCorrect ? '✓ Correct' : '✗ Incorrect — Correct answer: ' + LETTERS[q.correctIndex]}
      </div>
      <div class="explanation-text">${escapeHTML(q.explanation)}</div>
    </div>
  `;

  document.getElementById('skip-btn').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = state.currentIdx === state.questions.length - 1 ? 'See Results →' : 'Next Question →';
  nextBtn.addEventListener('click', nextQuestion);
}

function prevQuestion() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    state.locked = false;
    renderQuestion();
  }
}

function skipQuestion() {
  // Record as unanswered; advance
  const existing = state.answers.findIndex(a => a.questionIdx === state.currentIdx);
  if (existing < 0) {
    state.answers.push({ questionIdx: state.currentIdx, selectedIdx: null, correctIdx: state.questions[state.currentIdx].correctIndex, isCorrect: false, skipped: true });
  }
  nextQuestion();
}

function nextQuestion() {
  state.locked = false;
  if (state.currentIdx < state.questions.length - 1) {
    state.currentIdx++;
    renderQuestion();
  } else {
    renderResults();
  }
}

function renderResults() {
  statsEl.style.display = 'none';
  const total = state.questions.length;
  const correct = state.score;
  const pct = Math.round((correct / total) * 100);
  const incorrect = state.answers.filter(a => !a.isCorrect);

  // Breakdown by source
  const bySource = {};
  state.questions.forEach((q, i) => {
    if (!bySource[q.source]) bySource[q.source] = { total: 0, correct: 0 };
    bySource[q.source].total++;
    const ans = state.answers.find(a => a.questionIdx === i);
    if (ans && ans.isCorrect) bySource[q.source].correct++;
  });

  let message = '';
  if (pct >= 90) message = '🎯 Excellent — you are exam-ready.';
  else if (pct >= 80) message = '✓ Strong performance. Review the incorrect items once more.';
  else if (pct >= 70) message = '📘 Solid foundation. Drill the incorrect areas before the exam.';
  else if (pct >= 60) message = '⚠️ More review needed. Focus on the sources with the lowest scores.';
  else message = '📚 Significant gaps — work through the study guide and retake.';

  app.innerHTML = `
    <div class="results">
      <h2>Practice Complete</h2>
      <div class="score-circle" style="--pct: ${pct}%;">
        <div class="score-inner">
          <div class="score-pct">${pct}%</div>
          <div class="score-label">Score</div>
        </div>
      </div>
      <div class="score-detail"><strong>${correct}</strong> correct out of <strong>${total}</strong></div>
      <div class="score-detail" style="color: var(--text-muted); font-size: 0.95rem;">${message}</div>

      <div class="breakdown">
        <h3>Breakdown by Source</h3>
        ${Object.entries(bySource).map(([source, data]) => {
          const sourcePct = Math.round((data.correct / data.total) * 100);
          return `
            <div class="breakdown-item">
              <div>${source}</div>
              <div class="breakdown-bar"><div class="breakdown-bar-fill" style="width: ${sourcePct}%;"></div></div>
              <div class="breakdown-score">${data.correct}/${data.total}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="action-row">
        <button class="btn-secondary" id="review-btn">Review Incorrect (${incorrect.length})</button>
        <button class="btn-primary" id="retake-btn">New Random Exam →</button>
      </div>
    </div>
  `;

  document.getElementById('retake-btn').addEventListener('click', renderStart);
  document.getElementById('review-btn').addEventListener('click', renderReview);
  if (incorrect.length === 0) document.getElementById('review-btn').disabled = true;
}

function renderReview() {
  const incorrectAnswers = state.answers.filter(a => !a.isCorrect);
  if (incorrectAnswers.length === 0) return;

  app.innerHTML = `
    <div class="results" style="text-align:left;">
      <h2 style="text-align:center;">Review — Incorrect Answers</h2>
      <p style="text-align:center; color: var(--text-muted); margin-bottom: 1.5rem;">${incorrectAnswers.length} question${incorrectAnswers.length === 1 ? '' : 's'} to review</p>
      ${incorrectAnswers.map((ans, i) => {
        const q = state.questions[ans.questionIdx];
        const yourAnswerText = ans.skipped ? '(Skipped)' : q.choices[ans.selectedIdx];
        const correctText = q.choices[q.correctIndex];
        return `
          <div class="review-item incorrect">
            <div class="review-meta"><span class="q-source">${q.source}</span></div>
            <div class="review-stem">${i + 1}. ${escapeHTML(q.stem)}</div>
            <div class="review-answer your"><strong>Your answer:</strong> ${escapeHTML(yourAnswerText)}</div>
            <div class="review-answer correct"><strong>Correct:</strong> ${escapeHTML(correctText)}</div>
            <div class="review-expl">${escapeHTML(q.explanation)}</div>
          </div>
        `;
      }).join('')}
      <div class="action-row">
        <button class="btn-primary" id="retake-btn-2">New Random Exam →</button>
      </div>
    </div>
  `;
  document.getElementById('retake-btn-2').addEventListener('click', renderStart);
}

function escapeHTML(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Init
renderStart();
</script>

</body>
</html>
